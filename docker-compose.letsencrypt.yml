# Docker Compose configuration for Abstracts Explorer — Let's Encrypt variant
# Compatible with Docker Compose v2+ and Podman Compose
#
# This file replaces docker-compose.yml when you want automatic TLS certificates
# from Let's Encrypt instead of supplying your own certificate files.
#
# FIRST-TIME SETUP — run this BEFORE "docker compose -f docker-compose.letsencrypt.yml up":
#
#   1. Replace every occurrence of "abstracts.example.com" in this file AND in
#      nginx/nginx.letsencrypt.conf with your actual domain.
#
#   2. Obtain the initial certificate with Certbot standalone mode
#      (nginx must NOT be running yet):
#
#        docker run --rm \
#          -p 80:80 \
#          -v letsencrypt-certs:/etc/letsencrypt \
#          certbot/certbot certonly --standalone \
#          --domain abstracts.example.com \
#          --email your@email.com \
#          --agree-tos --non-interactive
#
#      On Podman replace "docker run" with "podman run".
#
#   3. Start all services:
#
#        docker compose -f docker-compose.letsencrypt.yml up -d
#
# AUTOMATIC RENEWAL
#   The certbot service below renews certificates automatically every 12 hours
#   (Let's Encrypt certificates expire after 90 days; renewal is attempted when
#   less than 30 days remain).  nginx is signalled to reload after a successful
#   renewal so the new certificate is picked up without downtime.

services:
  # Nginx reverse proxy with SSL termination using Let's Encrypt certificates.
  # Listens on ports 80 (ACME challenges + redirect to HTTPS) and 443 (HTTPS).
  nginx:
    image: nginx:stable-alpine
    container_name: abstracts-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.letsencrypt.conf:/etc/nginx/nginx.conf:ro
      # Let's Encrypt certificates (shared with the certbot service)
      - letsencrypt-certs:/etc/letsencrypt:ro
      # ACME webroot challenge files (shared with the certbot service)
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      abstracts-explorer:
        condition: service_healthy
    restart: unless-stopped

  # Certbot service — handles automatic certificate renewal.
  # Checks for renewal every 12 hours; certificates are renewed when fewer than
  # 30 days remain before expiry.
  #
  # NOTE: Certbot and nginx run in separate containers, so Certbot cannot reload
  # nginx automatically after renewal.  After each renewal cycle you should
  # reload nginx to activate the new certificate:
  #
  #   docker compose -f docker-compose.letsencrypt.yml exec nginx nginx -s reload
  #
  # To automate this, add the following line to the host's crontab (runs daily):
  #   0 3 * * * docker exec abstracts-nginx nginx -s reload
  certbot:
    image: certbot/certbot:v5.4.0
    container_name: abstracts-certbot
    volumes:
      # Certificates volume (must match the nginx mount above)
      - letsencrypt-certs:/etc/letsencrypt
      # ACME webroot challenge files (must match the nginx mount above)
      - certbot-webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"
    restart: unless-stopped

  # Main Abstracts Explorer application
  # Port 5000 is intentionally not exposed to the host; all external traffic
  # is routed through the nginx reverse proxy above.
  abstracts-explorer:
    image: ghcr.io/thawn/abstracts-explorer:latest
    container_name: abstracts-explorer
    volumes:
      # Persist data directory
      - abstracts-data:/app/data
    environment:
      # Data dir must be the same as assigned to the volume, otherwise downloaded data will not persist
      - DATA_DIR=/app/data

      # Database configuration - using PostgreSQL
      - PAPER_DB=postgresql://abstracts:abstracts_password@postgres:5432/abstracts
      
      # Embeddings configuration - using ChromaDB service
      - EMBEDDING_DB=http://chromadb:8000
      - COLLECTION_NAME=papers
      
      # LLM Backend configuration
      # The auth token for the LLM backend is read from the environment variable LLM_BACKEND_AUTH_TOKEN,
      # which must be set in the environment or .env file.
      # Option 1: Use external service (e.g., blablador)
      - LLM_BACKEND_URL=https://api.helmholtz-blablador.fz-juelich.de
      - LLM_BACKEND_AUTH_TOKEN=${LLM_BACKEND_AUTH_TOKEN}

      # Option 2: Use host's LM Studio (requires host.docker.internal or host network)
      # - LLM_BACKEND_URL=http://host.docker.internal:1234
      
      # Models
      # For Blablador
      - CHAT_MODEL=alias-code
      - EMBEDDING_MODEL=alias-qwen3-8b-embeddings

      # For host's LM Studio we recommend
      # - CHAT_MODEL=gemma-3-4b-it-qat
      # - EMBEDDING_MODEL=text-embedding-qwen3-embedding-4b

      # RAG settings
      - MAX_CONTEXT_PAPERS=5
      - ENABLE_QUERY_REWRITING=true
      - QUERY_SIMILARITY_THRESHOLD=0.7
      
      # Logging configuration
      # Set log level: DEBUG, INFO, WARNING (default), ERROR, CRITICAL
      - LOG_LEVEL=WARNING

      # Reverse-proxy hop counts for werkzeug ProxyFix.
      # 1 = trust one proxy layer (default, matches the nginx service above).
      # Set to 0 to disable, or increase for additional proxy layers.
      - PROXY_X_FOR=1
      - PROXY_X_PROTO=1
      - PROXY_X_HOST=1
      - PROXY_X_PREFIX=1
    
    # Use host network mode for easier access to host's LM Studio
    # Uncomment if using LM Studio on host
    # network_mode: host
    
    # Depends on database services
    depends_on:
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ChromaDB vector database service
  chromadb:
    image: chromadb/chroma:latest
    container_name: abstracts-chromadb
    volumes:
      - chromadb-data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/8000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # PostgreSQL database service
  postgres:
    image: postgres:16-alpine
    container_name: abstracts-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=abstracts
      - POSTGRES_USER=abstracts
      - POSTGRES_PASSWORD=abstracts_password
      # Change password in production!
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abstracts"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  # Named volumes for persistent data
  abstracts-data:
    driver: local
  chromadb-data:
    driver: local
  postgres-data:
    driver: local
  # Let's Encrypt certificate storage (persists across container restarts)
  letsencrypt-certs:
    driver: local
  # Certbot ACME webroot challenge files
  certbot-webroot:
    driver: local

networks:
  default:
    name: abstracts-network
