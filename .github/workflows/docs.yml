name: Documentation

on:
    push:
        branches: [main, develop]
        paths:
            - 'docs/**'
            - 'src/**/*.py'
            - 'pyproject.toml'
            - 'uv.lock'
            - '.github/workflows/docs.yml'
            - '.github/actions/setup-environment/**'
    pull_request:
        branches: [main, develop]
        paths:
            - 'docs/**'
            - 'src/**/*.py'
            - 'pyproject.toml'
            - 'uv.lock'
            - '.github/workflows/docs.yml'
            - '.github/actions/setup-environment/**'
    workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
    contents: read
    pages: write
    id-token: write

# Allow one concurrent deployment
concurrency:
    group: "pages"
    cancel-in-progress: true

env:
    SPHINXOPTS: "-W --keep-going"

jobs:
    build-docs:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # Needed for hatch-vcs to determine version

            - name: Setup Abstracts Explorer Environment
              uses: ./.github/actions/setup-environment
              with:
                  python-version: '3.12'
                  install-node: 'false'
                  extras: '--extra docs'

            # ---------------------------------------------------------------
            # PR check: build only the current branch to verify docs compile
            # ---------------------------------------------------------------
            - name: Determine version label for PR build
              if: github.event_name == 'pull_request'
              id: pr_version
              run: |
                  # Use base_ref to determine which version this PR targets
                  if [[ "${{ github.base_ref }}" == "develop" ]]; then
                      echo "version=dev" >> "$GITHUB_OUTPUT"
                  else
                      echo "version=stable" >> "$GITHUB_OUTPUT"
                  fi

            - name: Build documentation (PR check)
              if: github.event_name == 'pull_request'
              env:
                  DOCS_VERSION: ${{ steps.pr_version.outputs.version }}
              run: |
                  cd docs
                  uv run make html

            - name: Check PR docs build
              if: github.event_name == 'pull_request'
              run: |
                  if [ -f docs/_build/html/index.html ]; then
                      echo "Documentation built successfully"
                  else
                      echo "Documentation build failed - index.html not found"
                      exit 1
                  fi

            # ---------------------------------------------------------------
            # Deployment build: build both stable (main) and dev (develop)
            # and combine into a single artifact for GitHub Pages.
            #
            # Layout:
            #   /          → stable docs (from main branch)
            #   /dev/      → development docs (from develop branch)
            # ---------------------------------------------------------------
            - name: Fetch main and develop branches
              if: github.event_name != 'pull_request'
              run: |
                  git fetch origin main || echo "::warning::Could not fetch main branch"
                  git fetch origin develop || echo "::warning::Could not fetch develop branch"

            - name: Build stable docs from main branch
              if: github.event_name != 'pull_request'
              run: |
                  git checkout main
                  uv sync --extra docs --quiet
                  cd docs
                  git clean -fdx _build/
                  DOCS_VERSION=stable uv run make html
                  mkdir -p /tmp/site
                  cp -r _build/html/. /tmp/site/

            - name: Build dev docs from develop branch
              if: github.event_name != 'pull_request'
              run: |
                  git checkout develop
                  uv sync --extra docs --quiet
                  cd docs
                  git clean -fdx _build/
                  DOCS_VERSION=dev uv run make html
                  mkdir -p /tmp/site/dev
                  cp -r _build/html/. /tmp/site/dev/

            - name: Check deployment build
              if: github.event_name != 'pull_request'
              run: |
                  if [ -f /tmp/site/index.html ] && [ -f /tmp/site/dev/index.html ]; then
                      echo "Both stable and dev documentation built successfully"
                  else
                      echo "Documentation build failed"
                      ls -la /tmp/site/ || true
                      exit 1
                  fi

            - name: Upload artifact
              if: github.event_name != 'pull_request'
              uses: actions/upload-pages-artifact@v4
              with:
                  path: /tmp/site

    deploy-docs:
        # Deploy on pushes to main or develop, and on manual triggers
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        needs: build-docs
        runs-on: ubuntu-latest

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
