# Nginx reverse proxy configuration for Abstracts Explorer — Let's Encrypt variant
#
# This configuration is used together with docker-compose.letsencrypt.yml.
# It handles:
#   - ACME webroot challenges on port 80 (used by Certbot for certificate issuance
#     and renewal) — all other port-80 traffic is redirected to HTTPS.
#   - HTTPS on port 443 using the certificate managed by Certbot.
#
# Prerequisites:
#   Certificates must already exist before nginx starts.  Run the first-time
#   issuance command documented in docs/docker.md before starting the stack.
#
# Certificate paths (inside the container):
#   /etc/letsencrypt/live/<DOMAIN>/fullchain.pem
#   /etc/letsencrypt/live/<DOMAIN>/privkey.pem
#
# Replace every occurrence of "abstracts.example.com" below with your domain.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # HTTP server — serves ACME webroot challenges and redirects everything else
    # to HTTPS.
    server {
        listen 80;
        server_name abstracts.example.com;

        # Certbot webroot challenge directory (shared volume with certbot service)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server with SSL termination using Let's Encrypt certificates
    server {
        listen 443 ssl;
        server_name abstracts.example.com;

        ssl_certificate     /etc/letsencrypt/live/abstracts.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/abstracts.example.com/privkey.pem;

        # Let Certbot manage the recommended SSL options; copy the snippet it
        # generates into /etc/letsencrypt/options-ssl-nginx.conf and uncomment:
        # include /etc/letsencrypt/options-ssl-nginx.conf;
        # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # Modern SSL settings - TLS 1.2 retained for broad client compatibility;
        # remove it to enforce TLS 1.3 only in higher-security environments.
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Proxy to the Waitress WSGI server
        location / {
            proxy_pass         http://abstracts-explorer:5000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
}
