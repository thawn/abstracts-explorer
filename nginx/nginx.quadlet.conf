# Nginx reverse proxy configuration for Abstracts Explorer — quadlet variant
#
# This file is used with the Podman quadlet setup (systemd/user/nginx/).
# It runs on the nginxinc/nginx-unprivileged image (non-root UID 101).
# Both HTTP and HTTPS traffic arrives on port 8080 via the system-level
# socket proxy (abstracts-web.socket + abstracts-web-proxy.service).
# nginx terminates TLS here; plain-HTTP clients receive a 301 redirect via
# the error_page 497 mechanism.
#
# Prerequisites:
#   - Place your SSL certificate at: ~/abstracts-explorer/certs/cert.pem
#   - Place your SSL private key at:  ~/abstracts-explorer/certs/key.pem
#   Both files are mounted into the nginx container read-only via the
#   Volume= directive in abstracts-nginx.container.
#
# To restrict nginx to a specific domain, replace "_" in the server_name
# directive with your domain (e.g. "server_name abstracts.example.com;").
#
# Security hardening summary:
#   - TLS 1.3 only (TLS 1.2 disabled; uncomment to re-enable for legacy clients)
#   - Strong ECDHE/ChaCha20 cipher suites when TLS 1.2 is enabled
#   - SSL session caching with session tickets disabled
#   - OCSP stapling (CA-signed certs only; remove for self-signed certs)
#   - HSTS, X-Content-Type-Options, X-Frame-Options, Referrer-Policy headers
#   - Content-Security-Policy header restricting resource origins
#   - Permissions-Policy header restricting browser features
#   - CORS restricted to same-origin (upstream wildcard header suppressed)
#   - Server version header suppressed

# we are using the nginx-unprivileged container, which stores the pid file in a non-standard location
pid /tmp/nginx.pid;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Hide nginx version from error pages and the Server response header
    server_tokens off;

    # ---------------------------------------------------------------------------
    # Global SSL settings (apply to all HTTPS virtual hosts)
    # ---------------------------------------------------------------------------

    # TLS 1.3 only.
    # To support legacy clients (not recommended) uncomment the three lines below
    # and comment out the TLSv1.3-only line:
    #   ssl_protocols       TLSv1.2 TLSv1.3;
    #   ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    #   ssl_prefer_server_ciphers on;
    ssl_protocols TLSv1.3;

    # Session resumption — shared cache across worker processes; tickets disabled
    # to prevent forward-secrecy bypass via leaked session ticket keys.
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---------------------------------------------------------------------------
    # Single-port HTTPS server with HTTP→HTTPS redirect.
    # Both port-80 and port-443 traffic is forwarded to 8080 by the system
    # socket proxy.  TLS clients connect normally; plain-HTTP clients trigger
    # nginx error 497 and are redirected to HTTPS.
    # ---------------------------------------------------------------------------
    server {
        listen 8080 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Redirect plain HTTP requests that arrive on this SSL port.
        error_page 497 =301 https://$host$request_uri;

        # OCSP stapling — reduces handshake latency and enables revocation checking.
        # Requires:
        #   - A certificate issued by a public CA (remove these lines for self-signed certs)
        #   - cert.pem to contain the full chain (server cert + intermediates)
        #   - Outbound internet access from the nginx container
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/certs/cert.pem;
        resolver        1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # ---------------------------------------------------------------------------
        # Security headers
        # ---------------------------------------------------------------------------

        # HSTS: tell browsers to only use HTTPS for the next 2 years.
        # Remove 'includeSubDomains' if you do not want this to apply to sub-domains.
        # Only add 'preload' after you have verified HTTPS works correctly:
        #   https://hstspreload.org/
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # Prevent MIME-type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # Prevent this page from being embedded in iframes on other origins
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Control the Referer header sent on navigation
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Legacy XSS filter (defense-in-depth for older browsers)
        add_header X-XSS-Protection "1; mode=block" always;

        # Content Security Policy:
        #   - default-src 'self': only load resources from the same origin by default
        #   - script-src 'self' 'unsafe-inline' 'unsafe-eval':
        #       'unsafe-inline' is required for inline onclick/onchange event handlers in the HTML;
        #       'unsafe-eval' is required for Plotly's internal use of new Function()
        #   - style-src 'self' 'unsafe-inline': required for inline <style> blocks in the HTML
        #     and for styles injected dynamically by Plotly
        #   - img-src 'self' data: blob:; 'data:' covers base64-encoded images,
        #     'blob:' covers Plotly plot exports and file downloads via URL.createObjectURL()
        #   - font-src 'self': all fonts (KaTeX, Font Awesome) are bundled locally
        #   - connect-src 'self': API calls are same-origin only
        #   - frame-ancestors 'none': equivalent to X-Frame-Options DENY for modern browsers
        #   - object-src 'none': block Flash/Java applets
        #   - base-uri 'self': prevent injection of a <base> tag that redirects relative URLs
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;

        # Permissions-Policy: restrict browser features not needed by the application
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

        # ---------------------------------------------------------------------------
        # Proxy to the Abstracts Explorer application container
        # ---------------------------------------------------------------------------
        location / {
            proxy_pass         http://abstracts-explorer:5000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # Hide upstream headers that reveal server implementation details
            proxy_hide_header  X-Powered-By;

            # CORS: suppress the upstream wildcard Access-Control-Allow-Origin header
            # that Flask-CORS adds by default, and replace it with a same-origin-only
            # policy.  The frontend and API are served from the same origin, so
            # cross-origin access is not needed.  Only reflect the requesting Origin
            # back when it matches the Host (i.e. same-origin preflight/fetch) so that
            # browsers still receive a valid CORS response for their own requests while
            # preventing third-party sites from making credentialed or uncredentialed
            # cross-origin requests to the API.
            proxy_hide_header  Access-Control-Allow-Origin;
            proxy_hide_header  Access-Control-Allow-Credentials;
            proxy_hide_header  Access-Control-Allow-Methods;
            proxy_hide_header  Access-Control-Allow-Headers;
            proxy_hide_header  Access-Control-Expose-Headers;

            # Reflect only same-origin requests (Origin matches the server's own Host).
            # All traffic is HTTPS-only (HTTP is redirected above), so only match the
            # https:// scheme to avoid reflecting HTTP-origin requests.
            set $cors_origin "";
            if ($http_origin = "https://$host") {
                set $cors_origin $http_origin;
            }
            add_header Access-Control-Allow-Origin $cors_origin always;
        }
    }
}
