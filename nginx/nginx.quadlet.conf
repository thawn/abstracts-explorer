# Nginx reverse proxy configuration for Abstracts Explorer — quadlet variant
#
# This file is used with the Podman quadlet setup (systemd/user/nginx/).
# It differs from nginx/nginx.conf only in the port numbers: nginx listens on
# 8080 and 8443 (unprivileged) instead of 80 and 443.  Ports 80 and 443 are
# held by the system-level socket units and forwarded here by
# abstracts-http-proxy.service and abstracts-https-proxy.service.
#
# Prerequisites:
#   - Place your SSL certificate at: ~/abstracts-explorer/certs/cert.pem
#   - Place your SSL private key at:  ~/abstracts-explorer/certs/key.pem
#   Both files are mounted into the nginx container read-only via the
#   Volume= directive in systemd/user/nginx/abstracts-nginx.container.
#
# To restrict nginx to a specific domain, replace "_" in the server_name
# directives with your domain (e.g. "server_name abstracts.example.com;").

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Hide nginx version from error pages and the Server response header.
    server_tokens off;

    # ---------------------------------------------------------------------------
    # Global SSL settings
    # ---------------------------------------------------------------------------
    ssl_protocols TLSv1.3;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---------------------------------------------------------------------------
    # Redirect all HTTP traffic to HTTPS.
    # The socket proxy forwards external port 80 to this listener on 8080.
    # ---------------------------------------------------------------------------
    server {
        listen 8080;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # HTTPS server with SSL termination.
    # The socket proxy forwards external port 443 to this listener on 8443.
    # ---------------------------------------------------------------------------
    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # OCSP stapling — requires a CA-signed certificate and the full chain in cert.pem.
        # Remove these lines for self-signed certificates.
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/certs/cert.pem;
        resolver        1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # ---------------------------------------------------------------------------
        # Security headers
        # ---------------------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;

        # ---------------------------------------------------------------------------
        # Proxy to the Abstracts Explorer application container.
        # ---------------------------------------------------------------------------
        location / {
            proxy_pass         http://abstracts-explorer:5000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            proxy_hide_header  X-Powered-By;

            # CORS: restrict to same-origin only.
            proxy_hide_header  Access-Control-Allow-Origin;
            proxy_hide_header  Access-Control-Allow-Credentials;
            proxy_hide_header  Access-Control-Allow-Methods;
            proxy_hide_header  Access-Control-Allow-Headers;
            proxy_hide_header  Access-Control-Expose-Headers;

            set $cors_origin "";
            if ($http_origin = "https://$host") {
                set $cors_origin $http_origin;
            }
            add_header Access-Control-Allow-Origin $cors_origin always;
        }
    }
}
