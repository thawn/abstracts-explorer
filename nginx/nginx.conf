# Nginx reverse proxy configuration for Abstracts Explorer
# Handles SSL termination and proxies requests to the Waitress WSGI server.
#
# Prerequisites:
#   - Place your SSL certificate at: /etc/nginx/certs/cert.pem
#   - Place your SSL private key at:  /etc/nginx/certs/key.pem
#   These files are mounted into the nginx container via the docker-compose.yml
#   volume mount: ./certs:/etc/nginx/certs:ro

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server with SSL termination
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Modern SSL settings - TLS 1.2 retained for broad client compatibility;
        # remove it to enforce TLS 1.3 only in higher-security environments.
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Proxy to the Waitress WSGI server
        location / {
            proxy_pass         http://abstracts-explorer:5000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
}
